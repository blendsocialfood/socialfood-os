<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mission Control - Social Food OS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
:root {
  --orange: #EA580C;
  --bg: #050505;
  --surface: #0a0a0a;
  --surface-2: #111111;
  --border: rgba(255,255,255,0.06);
  --border-hover: rgba(255,255,255,0.12);
  --text: #f5f5f5;
  --text-muted: #666;
  --text-dim: #444;
}
body {
  font-family:'Inter',-apple-system,sans-serif;
  background:var(--bg); color:var(--text);
  min-height:100vh; overflow-x:hidden;
}

/* === NAV BAR === */
.top-bar {
  position:fixed; top:0; left:0; right:0; z-index:50;
  display:flex; align-items:center; justify-content:space-between;
  padding:16px 28px;
  background:rgba(5,5,5,0.85);
  backdrop-filter:blur(20px);
  border-bottom:1px solid rgba(255,255,255,0.04);
}
.top-bar-left { display:flex; align-items:center; gap:20px; overflow-x:auto; scrollbar-width:none; }
.top-bar-left::-webkit-scrollbar { display:none; }
.nav-logo {
  display:flex; align-items:center; gap:6px;
  text-decoration:none; padding:6px 14px;
  border-radius:10px; transition:all 0.3s;
  border:1px solid transparent;
}
.nav-logo.active { background:rgba(234,88,12,0.08); border-color:rgba(234,88,12,0.2); }
.nav-logo:not(.active):not(.disabled):hover { background:rgba(255,255,255,0.04); border-color:rgba(255,255,255,0.08); }
.nav-logo.disabled { opacity:0.25; cursor:default; pointer-events:none; }
.nav-logo .nav-icon {
  width:28px; height:28px; border-radius:8px;
  display:flex; align-items:center; justify-content:center;
  font-size:13px; font-weight:900; color:#fff;
}
.nav-logo .nav-label { font-size:12px; font-weight:600; color:#888; letter-spacing:0.3px; }
.nav-logo.active .nav-label { color:#ddd; }
.nav-sf .nav-icon { background:linear-gradient(145deg,#151515,#0d0d0d); border:1px solid rgba(255,255,255,0.1); font-size:11px; }
.nav-sf .nav-dot { display:inline-block; width:4px; height:4px; background:var(--orange); border-radius:50%; }
.nav-mc .nav-icon { background:linear-gradient(135deg,rgba(34,197,94,0.2),rgba(34,197,94,0.05)); border:1px solid rgba(34,197,94,0.25); font-size:10px; }
.nav-unity .nav-icon { background:linear-gradient(135deg,rgba(234,88,12,0.2),rgba(234,88,12,0.05)); border:1px solid rgba(234,88,12,0.25); font-size:14px; }
.nav-copilot .nav-icon { background:linear-gradient(135deg,rgba(59,130,246,0.2),rgba(59,130,246,0.05)); border:1px solid rgba(59,130,246,0.25); font-size:14px; }
.nav-prism .nav-icon { background:linear-gradient(135deg,rgba(28,130,180,0.2),rgba(28,130,180,0.05)); border:1px solid rgba(28,130,180,0.25); font-size:14px; }
.nav-drop .nav-icon { background:linear-gradient(135deg,rgba(220,38,38,0.2),rgba(220,38,38,0.05)); border:1px solid rgba(220,38,38,0.25); font-size:14px; }
.nav-firsttouch .nav-icon { background:linear-gradient(135deg,rgba(168,85,247,0.2),rgba(168,85,247,0.05)); border:1px solid rgba(168,85,247,0.25); font-size:14px; }
.nav-pixel .nav-icon { background:linear-gradient(135deg,rgba(245,158,11,0.2),rgba(245,158,11,0.05)); border:1px solid rgba(245,158,11,0.25); font-size:14px; }
.top-bar-right { display:flex; align-items:center; gap:16px; }
.user-info { font-size:12px; color:#555; }
.user-info strong { color:#999; }
.btn-logout {
  font-size:11px; font-weight:600; color:#444; text-decoration:none;
  padding:6px 14px; border-radius:8px; border:1px solid rgba(255,255,255,0.06); transition:all 0.3s;
}
.btn-logout:hover { color:#f87171; border-color:rgba(248,113,113,0.2); background:rgba(248,113,113,0.05); }

/* === AMBIENT === */
.ambient { position:fixed; inset:0; z-index:0; overflow:hidden; pointer-events:none; }
.ambient .orb { position:absolute; border-radius:50%; filter:blur(120px); opacity:0.4; animation:float 20s ease-in-out infinite; }
.ambient .orb-1 { width:600px; height:600px; background:radial-gradient(circle,rgba(34,197,94,0.1) 0%,transparent 70%); top:-200px; left:-100px; }
.ambient .orb-2 { width:500px; height:500px; background:radial-gradient(circle,rgba(234,88,12,0.06) 0%,transparent 70%); bottom:-150px; right:-100px; animation-delay:-10s; }
@keyframes float {
  0%,100% { transform:translate(0,0) scale(1); }
  33% { transform:translate(30px,-20px) scale(1.05); }
  66% { transform:translate(-20px,15px) scale(0.95); }
}

/* === PAGE === */
.mc-container {
  position:relative; z-index:2;
  max-width:1200px; margin:0 auto;
  padding:80px 24px 40px; text-align:center;
}
.mc-header { margin-bottom:28px; }
.mc-title {
  font-family:'Press Start 2P',monospace;
  font-size:clamp(14px,2.5vw,22px);
  color:var(--orange); letter-spacing:2px;
  margin-bottom:8px;
  text-shadow:0 0 30px rgba(234,88,12,0.3);
}
.mc-subtitle { font-size:13px; color:var(--text-muted); }

/* === CANVAS === */
.canvas-wrap {
  display:inline-block; border-radius:16px;
  overflow:hidden; border:1px solid var(--border);
  box-shadow:0 0 60px rgba(234,88,12,0.04), 0 20px 80px rgba(0,0,0,0.5);
  position:relative; background:#080808;
}
.canvas-wrap canvas {
  display:block;
  image-rendering:pixelated;
  image-rendering:crisp-edges;
  width:min(1600px, calc(100vw - 48px));
  height:auto;
}
.scanlines {
  position:absolute; inset:0; pointer-events:none; border-radius:16px;
  background:repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(0,0,0,0.06) 3px, rgba(0,0,0,0.06) 4px);
}
.crt-glow {
  position:absolute; inset:-2px; border-radius:18px; pointer-events:none;
  box-shadow:inset 0 0 60px rgba(0,0,0,0.5), 0 0 20px rgba(234,88,12,0.03);
}

/* === STATUS CARDS === */
.status-grid {
  display:grid; grid-template-columns:repeat(7,1fr);
  gap:10px; margin-top:20px;
}
@media (max-width:900px) { .status-grid { grid-template-columns:repeat(4,1fr); } }
@media (max-width:500px) {
  .status-grid { grid-template-columns:repeat(2,1fr); }
  .top-bar { padding:10px 12px; }
  .top-bar-left { gap:8px; }
  .nav-logo { padding:5px 10px; white-space:nowrap; flex-shrink:0; }
}
.status-card {
  background:var(--surface); border:1px solid var(--border);
  border-radius:12px; padding:14px 10px; text-align:center;
  transition:all 0.3s;
}
.status-card:hover { border-color:var(--border-hover); transform:translateY(-2px); }
.sc-dot {
  width:6px; height:6px; border-radius:50%;
  display:inline-block; margin-right:4px; vertical-align:middle;
}
.sc-dot.online { background:#22c55e; box-shadow:0 0 6px rgba(34,197,94,0.5); animation:pulse 3s ease-in-out infinite; }
.sc-dot.offline { background:#ef4444; box-shadow:0 0 6px rgba(239,68,68,0.5); animation:pulse 1s ease-in-out infinite; }
.sc-dot.checking { background:#555; }
@keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.4;} }
.sc-name { font-size:11px; font-weight:700; margin-bottom:2px; }
.sc-role { font-size:10px; color:var(--text-dim); margin-bottom:4px; }
.sc-ms { font-family:'Press Start 2P',monospace; font-size:8px; }

.last-check { margin-top:16px; font-size:11px; color:var(--text-dim); }

/* === NAV MOBILE === */
@media (max-width:600px) {
  .nav-label { font-size:11px; }
  .nav-icon { width:26px; height:26px; font-size:11px; }
}
</style>
</head>
<body>

<div class="top-bar">
  <div class="top-bar-left" id="nav-links"></div>
  <div class="top-bar-right">
    <span class="user-info" id="user-greeting"></span>
    <a href="/logout" class="btn-logout">Salir</a>
  </div>
</div>

<div class="ambient"><div class="orb orb-1"></div><div class="orb orb-2"></div></div>

<div class="mc-container">
  <div class="mc-header">
    <div class="mc-title">MISSION CONTROL</div>
    <div class="mc-subtitle">Estado en tiempo real del ecosistema Blend</div>
  </div>

  <div class="canvas-wrap">
    <canvas id="scene" width="400" height="200"></canvas>
    <div class="scanlines"></div>
    <div class="crt-glow"></div>
  </div>

  <div class="status-grid" id="status-grid"></div>
  <div class="last-check" id="last-check">Conectando...</div>
</div>

<script>
// ===================== CONFIG =====================
const canvas = document.getElementById('scene');
const ctx = canvas.getContext('2d');
ctx.imageSmoothingEnabled = false;

const W = 400, H = 200;

// ===================== SERVICES =====================
const SERVICES = [
  { id:'unity',      name:'Unity',    role:'Contenido',   color:'#EA580C', hair:'#5c2a0e', skin:'#D4A574', pants:'#2a2520', feature:'headset' },
  { id:'copilot',    name:'Copilot',  role:'Ads',         color:'#3B82F6', hair:'#1a2d4a', skin:'#FFDBAC', pants:'#1a2028', feature:'glasses' },
  { id:'prism',      name:'Prism',    role:'Diseno',      color:'#1C82B4', hair:'#0e3a4f', skin:'#C68642', pants:'#1a2528', feature:'beret' },
  { id:'bot',        name:'Bot IG',   role:'DMs',         color:'#22C55E', hair:'#333',    skin:'#666',    pants:'#1a2820', feature:'robot' },
  { id:'pixel',      name:'Pixel',    role:'Creatividad', color:'#F59E0B', hair:'#4a3208', skin:'#E0AC69', pants:'#282520', feature:'brush' },
  { id:'firsttouch', name:'F.Touch',  role:'Ventas',      color:'#A855F7', hair:'#2d1545', skin:'#8D5524', pants:'#201a28', feature:'tie' },
  { id:'drop',       name:'Drop',     role:'Publicar',    color:'#DC2626', hair:'#4a1010', skin:'#F1C27D', pants:'#281a1a', feature:'cap' },
];

let healthData = {};
let tick = 0;

// ===================== STAR POSITIONS (static) =====================
const STARS = [[178,25],[193,32],[208,22],[218,38],[183,42],[202,28],[188,35],[213,30],[196,40],[225,35]];

// ===================== POSITIONS =====================
const DESK_Y = 130;
const startX = 26;
const spacing = 50;
function getX(i) { return startX + i * spacing; }

// ===================== CHARACTER MOVEMENT =====================
const WALK_Y = 138;
const WALK_SPEED = 0.8;
const DESTINATIONS = [
  { x: 8 },   // coffee machine
  { x: 50 },  // whiteboard
  { x: 385 }, // plant
];

const charStates = SERVICES.map((svc, i) => ({
  state: 'sitting',       // sitting | walking_to | standing | walking_back
  x: getX(i),
  homeX: getX(i),
  destX: 0,
  timer: 60 + Math.floor(Math.random() * 180),
  standTimer: 0,
  facing: 1,              // 1=right, -1=left
  walkFrame: 0,
}));

function updateCharStates() {
  SERVICES.forEach((svc, i) => {
    const cs = charStates[i];
    const h = healthData[svc.id];
    const online = h ? h.status === 'online' : null;

    // Offline = always sitting (sleeping)
    if (online === false) {
      cs.state = 'sitting';
      cs.x = cs.homeX;
      return;
    }
    // No data yet = stay sitting
    if (online === null) return;

    if (cs.state === 'sitting') {
      cs.timer--;
      if (cs.timer <= 0) {
        // Pick a destination
        const dests = DESTINATIONS.map(d => d.x);
        // Can also visit other online characters' desks
        SERVICES.forEach((other, j) => {
          if (j !== i) {
            const oh = healthData[other.id];
            if (oh && oh.status === 'online') dests.push(getX(j));
          }
        });
        cs.destX = dests[Math.floor(Math.random() * dests.length)];
        cs.state = 'walking_to';
        cs.facing = cs.destX > cs.x ? 1 : -1;
      }
    } else if (cs.state === 'walking_to') {
      cs.walkFrame = Math.floor(tick / 8) % 2;
      if (Math.abs(cs.x - cs.destX) < WALK_SPEED + 0.1) {
        cs.x = cs.destX;
        cs.state = 'standing';
        cs.standTimer = 60 + Math.floor(Math.random() * 120);
      } else {
        cs.x += cs.facing * WALK_SPEED;
      }
    } else if (cs.state === 'standing') {
      cs.standTimer--;
      if (cs.standTimer <= 0) {
        cs.destX = cs.homeX;
        cs.state = 'walking_back';
        cs.facing = cs.destX > cs.x ? 1 : -1;
      }
    } else if (cs.state === 'walking_back') {
      cs.walkFrame = Math.floor(tick / 8) % 2;
      if (Math.abs(cs.x - cs.homeX) < WALK_SPEED + 0.1) {
        cs.x = cs.homeX;
        cs.state = 'sitting';
        cs.timer = 60 + Math.floor(Math.random() * 180);
      } else {
        cs.x += cs.facing * WALK_SPEED;
      }
    }
  });
}

// ===================== DRAW BACKGROUND =====================
function drawCeilingLight(cx) {
  ctx.fillStyle = '#3a3e4a';
  ctx.fillRect(cx - 6, 0, 12, 4);
  ctx.fillStyle = '#4a4e58';
  ctx.fillRect(cx - 8, 4, 16, 3);
  // Glow cone (layered for softer falloff)
  ctx.fillStyle = '#FFF8E0';
  ctx.globalAlpha = 0.02;
  ctx.fillRect(cx - 30, 7, 60, 120);
  ctx.globalAlpha = 0.03;
  ctx.fillRect(cx - 20, 7, 40, 90);
  ctx.globalAlpha = 0.05;
  ctx.fillRect(cx - 10, 7, 20, 50);
  ctx.globalAlpha = 1;
  // Bulb
  ctx.fillStyle = '#FFF0C0';
  ctx.globalAlpha = 0.7;
  ctx.fillRect(cx - 3, 7, 6, 2);
  ctx.globalAlpha = 1;
}

function drawBackground() {
  // === CEILING ===
  ctx.fillStyle = '#1a1e28';
  ctx.fillRect(0, 0, W, 6);
  ctx.fillStyle = '#161a24';
  for (let x = 0; x < W; x += 50) ctx.fillRect(x, 0, 1, 6);

  // === WALL ===
  ctx.fillStyle = '#2a3040';
  ctx.fillRect(0, 6, W, 56);

  // Crown molding
  ctx.fillStyle = '#4a5060';
  ctx.fillRect(0, 6, W, 2);

  // Wall vertical panel lines
  ctx.fillStyle = '#252a38';
  for (let x = 0; x < W; x += 57) ctx.fillRect(x, 8, 1, 54);

  // Chair rail trim
  ctx.fillStyle = '#404858';
  ctx.fillRect(0, 62, W, 2);

  // Lower wall (wainscoting)
  ctx.fillStyle = '#242838';
  ctx.fillRect(0, 64, W, 89);
  ctx.fillStyle = '#2e3444';
  for (let x = 28; x < W; x += 57) {
    ctx.fillRect(x, 66, 1, 85);
    ctx.fillRect(x + 28, 66, 1, 85);
  }

  // === BASEBOARD ===
  ctx.fillStyle = '#4a5060';
  ctx.fillRect(0, 151, W, 2);
  ctx.fillStyle = '#1e2230';
  ctx.fillRect(0, 153, W, 1);

  // === FLOOR (warm brown wood) ===
  ctx.fillStyle = '#5a4432';
  ctx.fillRect(0, 154, W, 46);
  for (let fx = 0; fx < W; fx += 16) {
    for (let fy = 154; fy < 200; fy += 16) {
      if ((Math.floor(fx / 16) + Math.floor(fy / 16)) % 2 === 0) {
        ctx.fillStyle = '#42301c';
        ctx.fillRect(fx, fy, 16, 16);
      }
    }
  }
  ctx.fillStyle = '#3a2c1e';
  for (let fx = 0; fx < W; fx += 16) ctx.fillRect(fx, 154, 1, 46);
  for (let fy = 154; fy < 200; fy += 16) ctx.fillRect(0, fy, W, 1);

  // === 3 CEILING LIGHTS ===
  drawCeilingLight(80);
  drawCeilingLight(200);
  drawCeilingLight(320);

  // === LARGE WINDOW (center) ===
  const wx = 140, wy = 10, ww = 120, wh = 48;
  ctx.fillStyle = '#1e2230';
  ctx.fillRect(wx - 2, wy - 2, ww + 4, wh + 4);
  // Night sky
  ctx.fillStyle = '#0c1830';
  ctx.fillRect(wx, wy, ww, wh);
  // Horizon glow
  ctx.fillStyle = '#162040';
  ctx.fillRect(wx, wy + wh - 14, ww, 14);
  ctx.fillStyle = '#1a2848';
  ctx.fillRect(wx, wy + wh - 8, ww, 8);
  // City silhouette
  ctx.fillStyle = '#081020';
  const buildings = [
    [wx+5,wy+wh-8,6,8],[wx+13,wy+wh-12,4,12],[wx+19,wy+wh-6,8,6],
    [wx+30,wy+wh-14,5,14],[wx+37,wy+wh-9,7,9],[wx+46,wy+wh-7,5,7],
    [wx+54,wy+wh-16,4,16],[wx+60,wy+wh-10,6,10],[wx+68,wy+wh-8,8,8],
    [wx+78,wy+wh-13,5,13],[wx+85,wy+wh-7,6,7],[wx+93,wy+wh-11,5,11],
    [wx+100,wy+wh-6,7,6],[wx+109,wy+wh-9,5,9],
  ];
  buildings.forEach(([bx,by,bw,bh]) => ctx.fillRect(bx,by,bw,bh));
  // Building windows
  ctx.fillStyle = '#FFD060';
  buildings.forEach(([bx,by,bw,bh]) => {
    for (let wy2 = by + 2; wy2 < by + bh - 1; wy2 += 3) {
      for (let wx2 = bx + 1; wx2 < bx + bw - 1; wx2 += 2) {
        ctx.globalAlpha = Math.random() > 0.35 ? 0.5 : 0;
        ctx.fillRect(wx2, wy2, 1, 1);
      }
    }
  });
  ctx.globalAlpha = 1;
  // Stars
  ctx.fillStyle = '#fff';
  const starPositions = [
    [wx+10,wy+4],[wx+25,wy+8],[wx+40,wy+3],[wx+55,wy+10],[wx+70,wy+5],
    [wx+85,wy+8],[wx+95,wy+3],[wx+105,wy+6],[wx+15,wy+15],[wx+45,wy+18],
    [wx+75,wy+14],[wx+100,wy+16],[wx+30,wy+22],[wx+60,wy+20],[wx+90,wy+24],
  ];
  starPositions.forEach(([sx,sy]) => {
    ctx.globalAlpha = 0.4 + Math.sin(tick * 0.025 + sx * 0.7) * 0.4;
    ctx.fillRect(sx, sy, 1, 1);
  });
  ctx.globalAlpha = 1;
  // Moon
  ctx.fillStyle = '#F0E8D0';
  ctx.fillRect(wx + ww - 20, wy + 5, 6, 6);
  ctx.fillStyle = '#0c1830';
  ctx.fillRect(wx + ww - 18, wy + 4, 5, 5);
  ctx.fillStyle = '#F0E8D0';
  ctx.globalAlpha = 0.08;
  ctx.fillRect(wx + ww - 28, wy + 2, 16, 12);
  ctx.globalAlpha = 1;
  // Window frame
  ctx.fillStyle = '#4a5060';
  ctx.fillRect(wx - 1, wy - 1, ww + 2, 1); ctx.fillRect(wx - 1, wy + wh, ww + 2, 1);
  ctx.fillRect(wx - 1, wy - 1, 1, wh + 2); ctx.fillRect(wx + ww, wy - 1, 1, wh + 2);
  ctx.fillRect(wx + Math.floor(ww/3), wy, 1, wh);
  ctx.fillRect(wx + Math.floor(2*ww/3), wy, 1, wh);
  ctx.fillRect(wx, wy + Math.floor(wh/2), ww, 1);
  // Window sill
  ctx.fillStyle = '#4e5565';
  ctx.fillRect(wx - 4, wy + wh + 1, ww + 8, 3);
  // Window light on wall
  ctx.fillStyle = '#1a2848';
  ctx.globalAlpha = 0.06;
  ctx.fillRect(wx - 8, wy + wh + 4, ww + 16, 50);
  ctx.globalAlpha = 1;

  // === WHITEBOARD (left of window) ===
  ctx.fillStyle = '#5a5a5a';
  ctx.fillRect(17, 11, 67, 1); ctx.fillRect(17, 57, 67, 1);
  ctx.fillRect(17, 11, 1, 47); ctx.fillRect(83, 11, 1, 47);
  ctx.fillStyle = '#c8c8c0';
  ctx.fillRect(18, 12, 65, 44);
  ctx.fillStyle = '#d4d4cc';
  ctx.fillRect(20, 14, 61, 40);
  // Title
  ctx.fillStyle = '#EA580C';
  ctx.fillRect(24, 18, 22, 3);
  // Lines
  const lineLengths = [42, 36, 44, 32, 40];
  for (let i = 0; i < 5; i++) {
    ctx.fillStyle = '#888';
    ctx.globalAlpha = 0.5;
    ctx.fillRect(24, 26 + i * 5, lineLengths[i], 1);
    ctx.globalAlpha = 1;
  }
  ctx.fillStyle = '#22c55e';
  ctx.fillRect(70, 26, 3, 1); ctx.fillRect(70, 31, 3, 1); ctx.fillRect(70, 36, 3, 1);
  ctx.fillStyle = '#F59E0B';
  ctx.fillRect(70, 41, 3, 1); ctx.fillRect(70, 46, 3, 1);
  // Marker tray
  ctx.fillStyle = '#4a4a4a';
  ctx.fillRect(22, 57, 55, 3);
  ctx.fillStyle = '#EA580C'; ctx.fillRect(28, 57, 8, 2);
  ctx.fillStyle = '#3B82F6'; ctx.fillRect(38, 57, 8, 2);
  ctx.fillStyle = '#22C55E'; ctx.fillRect(48, 57, 8, 2);
  ctx.fillStyle = '#F59E0B'; ctx.fillRect(58, 57, 8, 2);

  // === CLOCK (right of window) ===
  ctx.fillStyle = '#4a4e58';
  ctx.fillRect(274, 16, 20, 20);
  ctx.fillStyle = '#e8e0d0';
  ctx.fillRect(275, 17, 18, 18);
  ctx.fillStyle = '#333';
  ctx.fillRect(284, 19, 1, 2); ctx.fillRect(290, 26, 2, 1);
  ctx.fillRect(284, 32, 1, 2); ctx.fillRect(277, 26, 2, 1);
  ctx.fillStyle = '#333';
  ctx.fillRect(284, 22, 1, 5); ctx.fillRect(284, 26, 5, 1);
  ctx.fillStyle = '#EA580C';
  ctx.fillRect(284, 26, 1, 1);

  // === SHELF WITH ITEMS (right side) ===
  ctx.fillStyle = '#4a4030';
  ctx.fillRect(300, 40, 2, 6); ctx.fillRect(370, 40, 2, 6);
  ctx.fillStyle = '#5a4838';
  ctx.fillRect(298, 38, 76, 2);
  // Books (full color)
  ctx.fillStyle = '#EA580C'; ctx.fillRect(302, 26, 4, 12);

// ===================== DRAW CHARACTER =====================
function drawCharacter(x, y, svc, typing, sleeping) {
  const { hair, skin, color, pants, feature } = svc;
  const skinDark = shadeColor(skin, -20);

  if (sleeping) {
    // Slumped on desk
    ctx.fillStyle = hair;
    ctx.fillRect(x + 5, y + 4, 5, 2);
    ctx.fillRect(x + 4, y + 6, 6, 1);
    ctx.fillStyle = skin;
    ctx.fillRect(x + 5, y + 7, 4, 3);
    // Closed eyes
    ctx.fillStyle = '#333';
    ctx.fillRect(x + 6, y + 8, 2, 1);
    // Body slumped
    ctx.fillStyle = color;
    ctx.fillRect(x + 1, y + 7, 4, 5);
    ctx.fillRect(x + 1, y + 10, 8, 2);
    // Arms draped
    ctx.fillStyle = skin;
    ctx.fillRect(x + 9, y + 9, 2, 1);
    // Legs
    ctx.fillStyle = pants;
    ctx.fillRect(x + 2, y + 12, 2, 2);
    ctx.fillRect(x + 6, y + 12, 2, 2);
    return;
  }

  // === Sitting upright, facing right ===
  // Hair
  ctx.fillStyle = hair;
  ctx.fillRect(x + 1, y, 6, 2);
  ctx.fillRect(x, y + 2, 7, 1);
  ctx.fillRect(x + 6, y + 3, 1, 2);

  // Feature: cap overrides hair
  if (feature === 'cap') {
    ctx.fillStyle = color;
    ctx.fillRect(x - 1, y, 9, 1);
    ctx.fillRect(x, y - 1, 7, 1);
  }
  // Feature: beret
  if (feature === 'beret') {
    ctx.fillStyle = color;
    ctx.fillRect(x - 1, y - 1, 8, 1);
    ctx.fillRect(x - 2, y, 3, 1);
  }

  // Head
  ctx.fillStyle = skin;
  ctx.fillRect(x + 1, y + 3, 5, 4);

  // Feature: robot face
  if (feature === 'robot') {
    ctx.fillStyle = '#555';
    ctx.fillRect(x + 1, y + 3, 5, 4);
    ctx.fillStyle = color;
    ctx.fillRect(x + 2, y + 4, 1, 1);
    ctx.fillRect(x + 4, y + 4, 1, 1);
    // Antenna
    ctx.fillStyle = '#444';
    ctx.fillRect(x + 3, y - 2, 1, 2);
    ctx.fillStyle = color;
    ctx.fillRect(x + 2, y - 3, 3, 1);
  } else {
    // Eye
    ctx.fillStyle = '#222';
    ctx.fillRect(x + 4, y + 4, 1, 1);
    // Mouth
    ctx.fillStyle = skinDark;
    ctx.fillRect(x + 4, y + 6, 1, 1);
  }

  // Feature: glasses
  if (feature === 'glasses') {
    ctx.fillStyle = '#888';
    ctx.fillRect(x + 2, y + 4, 4, 1);
  }
  // Feature: headset
  if (feature === 'headset') {
    ctx.fillStyle = '#444';
    ctx.fillRect(x - 1, y + 3, 1, 3);
    ctx.fillStyle = '#333';
    ctx.fillRect(x - 1, y + 5, 2, 2);
  }

  // Neck
  ctx.fillStyle = skin;
  ctx.fillRect(x + 2, y + 7, 3, 1);

  // Body
  ctx.fillStyle = color;
  ctx.fillRect(x, y + 8, 8, 4);

  // Feature: tie
  if (feature === 'tie') {
    ctx.fillStyle = shadeColor(color, -30);
    ctx.fillRect(x + 3, y + 8, 2, 3);
  }

  // Arms
  ctx.fillStyle = skin;
  if (typing) {
    ctx.fillRect(x + 6, y + 9, 3, 1);
    ctx.fillRect(x + 7, y + 10, 2, 1);
  } else {
    ctx.fillRect(x - 1, y + 9, 1, 2);
    ctx.fillRect(x + 7, y + 9, 2, 1);
  }

  // Feature: brush in hand
  if (feature === 'brush' && !sleeping) {
    ctx.fillStyle = '#6b4226';
    ctx.fillRect(x + 9, y + 8, 1, 4);
    ctx.fillStyle = color;
    ctx.fillRect(x + 9, y + 7, 1, 1);
  }

  // Legs
  ctx.fillStyle = pants;
  ctx.fillRect(x + 1, y + 12, 3, 2);
  ctx.fillRect(x + 5, y + 12, 3, 2);
  // Shoes
  ctx.fillStyle = '#151515';
  ctx.fillRect(x + 1, y + 14, 3, 1);
  ctx.fillRect(x + 5, y + 14, 3, 1);
}

// ===================== DRAW WALKING CHARACTER =====================
function drawWalkingCharacter(x, y, svc, facing, frame) {
  const { hair, skin, color, pants, feature } = svc;
  const skinDark = shadeColor(skin, -20);
  const f = facing > 0; // true=right, false=left

  // Hair
  ctx.fillStyle = hair;
  ctx.fillRect(x + 1, y, 6, 2);
  ctx.fillRect(x, y + 2, 7, 1);
  ctx.fillRect(x + (f ? 6 : 0), y + 3, 1, 2);

  // Cap
  if (feature === 'cap') {
    ctx.fillStyle = color;
    ctx.fillRect(x - 1, y, 9, 1);
    ctx.fillRect(x, y - 1, 7, 1);
  }
  // Beret
  if (feature === 'beret') {
    ctx.fillStyle = color;
    ctx.fillRect(x - 1, y - 1, 8, 1);
    ctx.fillRect(x - 2, y, 3, 1);
  }

  // Head
  ctx.fillStyle = skin;
  ctx.fillRect(x + 1, y + 3, 5, 4);

  // Robot face
  if (feature === 'robot') {
    ctx.fillStyle = '#555';
    ctx.fillRect(x + 1, y + 3, 5, 4);
    ctx.fillStyle = color;
    ctx.fillRect(x + 2, y + 4, 1, 1);
    ctx.fillRect(x + 4, y + 4, 1, 1);
    ctx.fillStyle = '#444';
    ctx.fillRect(x + 3, y - 2, 1, 2);
    ctx.fillStyle = color;
    ctx.fillRect(x + 2, y - 3, 3, 1);
  } else {
    // Eye (faces direction)
    ctx.fillStyle = '#222';
    ctx.fillRect(x + (f ? 4 : 2), y + 4, 1, 1);
    ctx.fillStyle = skinDark;
    ctx.fillRect(x + (f ? 4 : 2), y + 6, 1, 1);
  }

  // Glasses
  if (feature === 'glasses') {
    ctx.fillStyle = '#888';
    ctx.fillRect(x + 2, y + 4, 4, 1);
  }
  // Headset
  if (feature === 'headset') {
    ctx.fillStyle = '#444';
    ctx.fillRect(x + (f ? -1 : 7), y + 3, 1, 3);
    ctx.fillStyle = '#333';
    ctx.fillRect(x + (f ? -1 : 6), y + 5, 2, 2);
  }

  // Neck
  ctx.fillStyle = skin;
  ctx.fillRect(x + 2, y + 7, 3, 1);

  // Body
  ctx.fillStyle = color;
  ctx.fillRect(x, y + 8, 8, 4);

  // Tie
  if (feature === 'tie') {
    ctx.fillStyle = shadeColor(color, -30);
    ctx.fillRect(x + 3, y + 8, 2, 3);
  }
  // Brush in hand
  if (feature === 'brush') {
    ctx.fillStyle = '#6b4226';
    ctx.fillRect(x + (f ? 8 : -1), y + 8, 1, 4);
    ctx.fillStyle = color;
    ctx.fillRect(x + (f ? 8 : -1), y + 7, 1, 1);
  }

  // Arms swinging
  ctx.fillStyle = skin;
  if (frame === 0) {
    ctx.fillRect(x - 1, y + 8, 1, 3);
    ctx.fillRect(x + 8, y + 9, 1, 3);
  } else {
    ctx.fillRect(x - 1, y + 9, 1, 3);
    ctx.fillRect(x + 8, y + 8, 1, 3);
  }

  // Legs walking
  ctx.fillStyle = pants;
  if (frame === 0) {
    ctx.fillRect(x + 1, y + 12, 2, 3);
    ctx.fillRect(x + 5, y + 12, 2, 2);
  } else {
    ctx.fillRect(x + 1, y + 12, 2, 2);
    ctx.fillRect(x + 5, y + 12, 2, 3);
  }

  // Shoes
  ctx.fillStyle = '#222';
  if (frame === 0) {
    ctx.fillRect(x + (f ? 0 : 1), y + 15, 3, 1);
    ctx.fillRect(x + 5, y + 14, 2, 1);
  } else {
    ctx.fillRect(x + 1, y + 14, 2, 1);
    ctx.fillRect(x + (f ? 5 : 4), y + 15, 3, 1);
  }
}

// ===================== DRAW ZZZ =====================
function drawZzz(x, y, t) {
  ctx.fillStyle = '#fff';
  const drawZ = (zx, zy, s) => {
    ctx.fillRect(zx, zy, s, 1);
    for (let i = 1; i < s; i++) ctx.fillRect(zx + s - 1 - i, zy + i, 1, 1);
    ctx.fillRect(zx, zy + s, s, 1);
  };
  const phase = (t * 0.5) % 12;
  ctx.globalAlpha = 0.5;
  drawZ(x + 10 + Math.sin(t * 0.8) * 1.5, y + 1 - (phase % 6), 3);
  ctx.globalAlpha = 0.3;
  drawZ(x + 15 + Math.sin(t * 0.6 + 2) * 1, y - 3 - (phase % 6), 2);
  ctx.globalAlpha = 0.15;
  drawZ(x + 18 + Math.sin(t * 0.4 + 4) * 1, y - 6 - (phase % 6), 2);
  ctx.globalAlpha = 1;
}

// ===================== DRAW STATUS DOT =====================
function drawStatusDot(x, y, online) {
  const pulse = Math.sin(tick * 0.08) * 0.3;
  if (online) {
    ctx.fillStyle = '#22c55e';

    ctx.fillRect(x + 1, y - 19, 10, 5);
    ctx.globalAlpha = 1;
    ctx.fillRect(x + 4, y - 18, 4, 3);
  } else {
    ctx.fillStyle = '#ef4444';
    ctx.globalAlpha = 0.4 + pulse;
    ctx.fillRect(x + 4, y - 18, 4, 3);
    ctx.globalAlpha = 1;
  }
}

// ===================== UTILITY =====================
function shadeColor(hex, percent) {
  const num = parseInt(hex.replace('#', ''), 16);
  const r = Math.min(255, Math.max(0, (num >> 16) + percent));
  const g = Math.min(255, Math.max(0, ((num >> 8) & 0x00FF) + percent));
  const b = Math.min(255, Math.max(0, (num & 0x0000FF) + percent));
  return '#' + (0x1000000 + r * 0x10000 + g * 0x100 + b).toString(16).slice(1);
}

// ===================== MAIN RENDER =====================
function render() {
  ctx.clearRect(0, 0, W, H);
  drawBackground();

  tick++;
  const animFrame = Math.floor(tick / 30) % 2;

  // Pass 1: furniture + sitting/sleeping characters
  SERVICES.forEach((svc, i) => {
    const x = getX(i);
    const y = DESK_Y;
    const h = healthData[svc.id];
    const online = h ? h.status === 'online' : null;
    const cs = charStates[i];

    drawChair(x, y);
    drawDesk(x, y);
    drawMonitor(x, y, svc.color, online !== false);

    // Only draw character at desk if sitting
    if (cs.state === 'sitting') {
      const typing = online && animFrame === 1;
      const sleeping = online === false;
      drawCharacter(x, y, svc, typing, sleeping);
      if (sleeping) drawZzz(x, y, tick * 0.04);
    }

    if (online !== null) drawStatusDot(x, y, online);
    drawNamePlate(x, y, svc.name, svc.color);
    if (h) drawMsBadge(x, y, h.ms, online);
  });

  // Pass 2: walking characters (drawn on top of furniture)
  SERVICES.forEach((svc, i) => {
    const cs = charStates[i];
    if (cs.state !== 'sitting') {
      drawWalkingCharacter(Math.round(cs.x), WALK_Y, svc, cs.facing, cs.walkFrame);
    }
  });

  // Update movement
  updateCharStates();

  // Title on canvas top
  ctx.fillStyle = '#EA580C';
  ctx.globalAlpha = 0.12;
  ctx.font = '6px "Press Start 2P"';
  ctx.textAlign = 'center';
  ctx.fillText('BLEND SOCIAL FOOD', W / 2, 12);
  ctx.textAlign = 'left';
  ctx.globalAlpha = 1;

  requestAnimationFrame(render);
}

// ===================== HEALTH CHECK =====================
let lastCheckTime = null;

async function checkHealth() {
  try {
    const r = await fetch('/api/health');
    if (!r.ok) throw new Error('HTTP ' + r.status);
    healthData = await r.json();
    lastCheckTime = new Date();
    updateStatusCards();
    document.getElementById('last-check').textContent =
      'Ultima verificacion: ' + lastCheckTime.toLocaleTimeString('es-CL');
  } catch (e) {
    document.getElementById('last-check').textContent = 'Error de conexion — reintentando...';
  }
}

function updateStatusCards() {
  document.getElementById('status-grid').innerHTML = SERVICES.map(svc => {
    const h = healthData[svc.id];
    const online = h && h.status === 'online';
    const dotClass = h ? (online ? 'online' : 'offline') : 'checking';
    const msText = h ? (online ? h.ms + 'ms' : 'OFFLINE') : '...';
    const msColor = h ? (online ? '#22c55e' : '#ef4444') : '#555';
    const borderColor = h ? (online ? 'rgba(34,197,94,0.15)' : 'rgba(239,68,68,0.15)') : 'var(--border)';
    return `<div class="status-card" style="border-color:${borderColor}">
      <div class="sc-name"><span class="sc-dot ${dotClass}"></span>${svc.name}</div>
      <div class="sc-role">${svc.role}</div>
      <div class="sc-ms" style="color:${msColor}">${msText}</div>
    </div>`;
  }).join('');
}

    <a href="${canPixel ? PIXEL_URL+'?token='+token : '#'}" class="nav-logo nav-pixel ${canPixel ? '' : 'disabled'}" ${!canPixel ? 'style="opacity:0.35;pointer-events:none;"' : ''}>
      <div class="nav-icon">&#10022;</div>
      <span class="nav-label">Pixel</span>
    </a>
    <a href="${canDrop ? DROP_URL+'?token='+token : '#'}" class="nav-logo nav-drop ${canDrop ? '' : 'disabled'}" style="${canDrop ? '' : 'display:none;'}">
      <div class="nav-icon">&#128640;</div>
      <span class="nav-label">Drop</span>
    </a>
    <a href="${canFirstTouch ? FIRSTTOUCH_URL+'?token='+token : '#'}" class="nav-logo nav-firsttouch ${canFirstTouch ? '' : 'disabled'}">
      <div class="nav-icon">&#9830;</div>
      <span class="nav-label">First Touch</span>
    </a>
  `;
  document.getElementById('user-greeting').innerHTML = `Hola, <strong>${SF_USER.name}</strong>`;
}

setupNav();
render();
checkHealth();
setInterval(checkHealth, 30000);
</script>
